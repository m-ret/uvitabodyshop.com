name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://uvitabodyshop.com

  lighthouse:
    # Non-blocking during rollout. Flip to `continue-on-error: false` once
    # the mobile baseline holds for three consecutive PRs per performance-budget.md.
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://uvitabodyshop.com

      - name: Start production server
        run: |
          npm run start &
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/ -o /dev/null; then
              echo "server up"; break
            fi
            sleep 1
          done

      - name: Lighthouse audit (mobile)
        env:
          LH_URL: http://localhost:3000
        run: node scripts/lighthouse-audit.mjs
